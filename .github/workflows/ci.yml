# 시차(視差) CI — 수지/순환 원천 데이터 없이 도는 순수 검사만.
# 지표 단위 테스트 · 전 소스 바이트컴파일 · 사이트 JS 문법 검사.
name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 순수 단위·계약 테스트 — 수지/순환 원천(sale_*.xml·ecos·kosis 등)에 의존하지 않는다.
      # lags import는 부작용이 없어(load_series는 main()에서만 호출) 원천 데이터가 없는
      # CI 러너에서도 통과한다. pytest 불필요 — 파일 자체 러너로 실행(실패=비정상 종료).
      # 계약 테스트(scope·event-window)는 out/(미커밋) 부재 시 순수 규칙만 돌고 번들 검증은
      # 명시적으로 skip 한다. ledger 계약은 data/ledger.json이 커밋되어 실측까지 검증한다.
      - name: Unit & contract tests (metrics·scope·ledger·event-window)
        run: |
          for t in tests/test_*.py; do
            echo "── python3 $t"
            python3 "$t" || exit 1
          done

      # 전 소스 바이트컴파일 — 문법 회귀 차단. find로 top-level(src/__init__.py) 포함
      # 모든 .py를 대상으로 한다(셸 globstar 설정에 의존하지 않음).
      - name: Byte-compile Python sources
        run: find src -name '*.py' -print0 | xargs -0 python -m py_compile

      # 사이트 스크립트 문법 검사 — 파일별로 검사(node --check는 다중 인자에서 첫 파일만 본다).
      - name: Check site JS
        run: |
          for f in site/js/*.js; do
            echo "node --check $f"
            node --check "$f" || exit 1
          done

      # DOM 계약(지도 17개 시도 path·판독 요소 존재) — 빌드 산출(web/, 미커밋)이 있으면
      # 검증하고, CI에선 없어 skip(정상 종료)한다. 로컬 빌드 후 실검증된다.
      - name: DOM contract test (map)
        run: node tests/test_map_contract.js
