# 시차(視差) CI — 수지/순환 원천 데이터 없이 도는 검사만.
# 지표·원장·계약 단위 테스트 · 전 소스 바이트컴파일 · 사이트 JS 문법 · 커밋된 번들로 빌드→DOM 계약.
name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

# 산출물 필수 — 계약 검사가 '산출물 없음'으로 조용히 skip 되지 않게 강제한다.
# out/site_bundle.json은 리포에 커밋되고(원천 데이터 불필요한 자족 스냅샷), web/은 이 번들로
# CI에서 빌드한다. 두 산출물이 부재하면 계약 테스트는 skip 대신 실패한다.
env:
  SICHA_REQUIRE_ARTIFACTS: "1"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 단위·계약 테스트 — 수지/순환 원천(sale_*.xml·ecos·kosis 등)에 의존하지 않는다.
      # lags import는 부작용이 없어(load_series는 main()에서만 호출) 원천 데이터가 없는
      # CI 러너에서도 통과한다. pytest 불필요 — 파일 자체 러너로 실행(실패=비정상 종료).
      # 원장(data/ledger.json)·번들(out/site_bundle.json)이 커밋돼 있어 scope·event-window·
      # ledger 계약이 실측까지 검증한다(SICHA_REQUIRE_ARTIFACTS=1 → 부재 시 skip 대신 실패).
      - name: Unit & contract tests (metrics·scope·ledger·event-window)
        run: |
          for t in tests/test_*.py; do
            echo "── python3 $t"
            python3 "$t" || exit 1
          done

      # 전 소스 바이트컴파일 — 문법 회귀 차단. find로 top-level(src/__init__.py) 포함
      # 모든 .py를 대상으로 한다(셸 globstar 설정에 의존하지 않음).
      - name: Byte-compile Python sources
        run: find src -name '*.py' -print0 | xargs -0 python -m py_compile

      # 사이트 스크립트 문법 검사 — 파일별로 검사(node --check는 다중 인자에서 첫 파일만 본다).
      - name: Check site JS
        run: |
          for f in site/js/*.js; do
            echo "node --check $f"
            node --check "$f" || exit 1
          done

      # 사이트 빌드 — 커밋된 out/site_bundle.json + site/ 만으로 web/index.html 생성(수지/순환 불필요).
      # 이 빌드가 DOM 계약(지도 path·판독 요소·원장 고지 문구)의 검증 대상을 만든다.
      - name: Build site from committed bundle
        run: python3 src/build/assemble.py

      # DOM 계약(17개 시도 path·판독 요소·전향/사후 구분·사후 검증 고지) — 위 빌드 산출을 검증.
      # SICHA_REQUIRE_ARTIFACTS=1 → web/ 부재 시 skip 대신 실패.
      - name: DOM contract test (map)
        run: node tests/test_map_contract.js

      # ── 반응형 스모크 (외부 반응형 감사) — 5뷰포트 가로 오버플로 0·핵심 터치 타깃 ≥44px ──
      # Chrome 헤드리스(CDP, 의존성 0). ubuntu 러너 preinstall google-chrome 사용.
      # 브라우저·산출물 부재 시 자동 skip(exit 0) → 기존 CI green 유지. web/은 위 빌드가 생성.
      - name: Ensure Chrome (install if missing · non-blocking)
        run: |
          if command -v google-chrome >/dev/null 2>&1 || command -v chromium >/dev/null 2>&1 || command -v chromium-browser >/dev/null 2>&1; then
            echo "브라우저 존재 → 설치 생략"
          else
            sudo apt-get update -qq && sudo apt-get install -y -qq chromium || echo "설치 실패 — 반응형 검사 자동 skip"
          fi
      - name: Responsive smoke (multi-viewport)
        run: node tests/responsive_check.js
